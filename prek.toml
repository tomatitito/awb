# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "local"
hooks = [
  { id = "biome-check", name = "biome check", entry = "bun scripts/pre-commit-biome.mjs", language = "system", pass_filenames = true },
  { id = "bun-test", name = "bun test", entry = "bun test", language = "system", pass_filenames = false, always_run = true }
]
